version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnisync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnisync
      POSTGRES_DB: omnisync
      POSTGRES_PASSWORD: omnisync
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omnisync_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnisync_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://omnisync:omnisync@postgres:5432/omnisync
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnisync_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://omnisync:omnisync@postgres:5432/omnisync
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - backend
      - redis
      - postgres
    command: celery -A app.workers.celery_app.celery_app worker -Q webhooks,ai,outbound --loglevel=info
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnisync_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://omnisync:omnisync@postgres:5432/omnisync
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - backend
      - redis
      - postgres
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnisync_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pg_data:
  uploads_data:
